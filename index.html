<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>StoryLoom — Color</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #1A2340; font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 16px; }
  h1 { color: #C9A84C; font-size: 20px; font-weight: 600; margin-bottom: 4px; letter-spacing: 0.05em; }
  .subtitle { color: rgba(255,255,255,0.4); font-size: 12px; margin-bottom: 16px; }
  .palette { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-bottom: 16px; }
  .swatch { width: 36px; height: 36px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; transition: transform 0.15s, border-color 0.15s; }
  .swatch.active { border-color: white; transform: scale(1.2); }
  .swatch:hover { transform: scale(1.15); }
  .canvas-wrap { background: white; border-radius: 16px; overflow: hidden; box-shadow: 0 8px 32px rgba(0,0,0,0.4); position: relative; touch-action: none; }
  canvas { display: block; cursor: crosshair; touch-action: none; }
  .controls { display: flex; gap: 10px; margin-top: 14px; }
  .btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 10px; padding: 8px 18px; font-size: 13px; cursor: pointer; color: rgba(255,255,255,0.8); transition: background 0.15s; }
  .btn:hover { background: rgba(255,255,255,0.2); }
  .btn.undo { border-color: #4ABFB4; color: #4ABFB4; }
  .stats { display: flex; gap: 16px; margin-top: 14px; }
  .stat { text-align: center; }
  .stat-val { font-size: 22px; font-weight: 500; color: #C9A84C; }
  .stat-lbl { font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 2px; }
  .loading { color: rgba(255,255,255,0.6); font-size: 14px; padding: 40px; }
</style>
</head>
<body>
<h1>STORYLOOM</h1>
<p class="subtitle">Tap any region to color it</p>

<div class="palette" id="palette"></div>
<div class="canvas-wrap" id="wrap">
  <p class="loading" id="loading">Loading artwork...</p>
  <canvas id="c" style="display:none"></canvas>
</div>
<div class="controls">
  <button class="btn undo" onclick="undo()">↩ Undo</button>
  <button class="btn" onclick="resetCanvas()">Clear</button>
  <button class="btn" onclick="saveImage()">Save</button>
</div>
<div class="stats">
  <div class="stat"><div class="stat-val" id="fill-count">0</div><div class="stat-lbl">regions filled</div></div>
</div>

let activeColor = PALETTE[0];
let ctx, canvas, W, H;
let history = [];
let fillCount = 0;

// Build palette
const palDiv = document.getElementById("palette");
PALETTE.forEach((c, i) => {
  const s = document.createElement("div");
  s.className = "swatch" + (i === 0 ? " active" : "");
  s.style.background = c;
  s.onclick = () => {
    document.querySelectorAll(".swatch").forEach(el => el.classList.remove("active"));
    s.classList.add("active");
    activeColor = c;
  };
  palDiv.appendChild(s);
});

// Load SVG and render to canvas
const img = new Image();
img.onload = () => {
  const wrap = document.getElementById("wrap");
  const maxW = Math.min(window.innerWidth - 32, 480);
  W = maxW; H = maxW; // square
  canvas = document.getElementById("c");
  canvas.width = W; canvas.height = H;
  canvas.style.display = "block";
  ctx = canvas.getContext("2d", { willReadFrequently: true });
  ctx.fillStyle = "white";
  ctx.fillRect(0, 0, W, H);
  ctx.drawImage(img, 0, 0, W, H);
  document.getElementById("loading").style.display = "none";
  canvas.addEventListener("click", handleClick);
  canvas.addEventListener("touchend", handleTouch, { passive: false });
};
img.src = SVG_URL;

function handleTouch(e) {
  e.preventDefault();
  const t = e.changedTouches[0];
  const rect = canvas.getBoundingClientRect();
  const x = Math.round((t.clientX - rect.left) * (W / rect.width));
  const y = Math.round((t.clientY - rect.top) * (H / rect.height));
  floodFill(x, y, activeColor);
}

function handleClick(e) {
  const rect = canvas.getBoundingClientRect();
  const x = Math.round((e.clientX - rect.left) * (W / rect.width));
  const y = Math.round((e.clientY - rect.top) * (H / rect.height));
  floodFill(x, y, activeColor);
}

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return [r, g, b];
}

function colorMatch(data, idx, r, g, b, tolerance=30) {
  return Math.abs(data[idx]-r) <= tolerance &&
         Math.abs(data[idx+1]-g) <= tolerance &&
         Math.abs(data[idx+2]-b) <= tolerance;
}

function isDark(data, idx) {
  return data[idx] < 80 && data[idx+1] < 80 && data[idx+2] < 80;
}

function floodFill(startX, startY, hexColor) {
  const imageData = ctx.getImageData(0, 0, W, H);
  const data = imageData.data;
  const [fillR, fillG, fillB] = hexToRgb(hexColor);

  const startIdx = (startY * W + startX) * 4;
  const startR = data[startIdx];
  const startG = data[startIdx+1];
  const startB = data[startIdx+2];

  // Don't fill dark outlines
  if (isDark(data, startIdx)) return;
  // Already this color
  if (colorMatch(data, startIdx, fillR, fillG, fillB, 5)) return;

  // Save state for undo
  history.push(ctx.getImageData(0, 0, W, H));
  if (history.length > 20) history.shift();

  // Scanline flood fill
  const stack = [[startX, startY]];
  const visited = new Uint8Array(W * H);

  while (stack.length > 0) {
    const [x, y] = stack.pop();
    if (x < 0 || x >= W || y < 0 || y >= H) continue;
    const idx = (y * W + x) * 4;
    if (visited[y * W + x]) continue;
    if (isDark(data, idx)) continue;
    if (!colorMatch(data, idx, startR, startG, startB)) continue;

    visited[y * W + x] = 1;
    data[idx] = fillR;
    data[idx+1] = fillG;
    data[idx+2] = fillB;
    data[idx+3] = 255;

    stack.push([x+1, y], [x-1, y], [x, y+1], [x, y-1]);
  }

  ctx.putImageData(imageData, 0, 0);
  
  // Redraw outlines on top to keep them crisp
  ctx.drawImage(img, 0, 0, W, H);
  
  fillCount++;
  document.getElementById("fill-count").textContent = fillCount;
}

function undo() {
  if (history.length === 0) return;
  ctx.putImageData(history.pop(), 0, 0);
  ctx.drawImage(img, 0, 0, W, H);
  fillCount = Math.max(0, fillCount - 1);
  document.getElementById("fill-count").textContent = fillCount;
}

function resetCanvas() {
  history = [];
  fillCount = 0;
  ctx.fillStyle = "white";
  ctx.fillRect(0, 0, W, H);
  ctx.drawImage(img, 0, 0, W, H);
  document.getElementById("fill-count").textContent = 0;
}

function saveImage() {
  const link = document.createElement("a");
  link.download = "storyloom-coloring.png";
  link.href = canvas.toDataURL("image/png");
  link.click();
}
