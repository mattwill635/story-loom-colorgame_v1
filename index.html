
<style>
  .coloring-app { padding: 1rem 0; font-family: var(--font-sans); }
  .toolbar { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 1rem; }
  .color-swatch { width: 32px; height: 32px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: transform 0.15s, border-color 0.15s; }
  .color-swatch:hover { transform: scale(1.15); }
  .color-swatch.active { border-color: var(--color-text-primary); transform: scale(1.15); }
  .canvas-wrap { background: var(--color-background-secondary); border-radius: var(--border-radius-lg); border: 0.5px solid var(--color-border-tertiary); display: flex; align-items: center; justify-content: center; padding: 1.5rem; }
  svg.scene { width: 100%; max-width: 480px; height: auto; cursor: pointer; }
  .region { transition: fill 0.2s; stroke: #1A2340; stroke-width: 1.5; stroke-linejoin: round; }
  .region:hover { opacity: 0.85; }
  .stats { display: flex; gap: 12px; margin-top: 1rem; }
  .stat { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 0.6rem 1rem; flex: 1; text-align: center; }
  .stat-val { font-size: 22px; font-weight: 500; color: var(--color-text-primary); }
  .stat-lbl { font-size: 12px; color: var(--color-text-secondary); margin-top: 2px; }
  .btn-reset { background: transparent; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); padding: 6px 14px; font-size: 13px; cursor: pointer; color: var(--color-text-secondary); margin-left: auto; }
  .btn-reset:hover { background: var(--color-background-secondary); }
  .complete-msg { display: none; text-align: center; padding: 0.75rem; background: var(--color-background-success); color: var(--color-text-success); border-radius: var(--border-radius-md); font-size: 14px; margin-top: 0.75rem; }
</style>

<div class="coloring-app">
  <h2 class="sr-only">StoryLoom ambient coloring game — a nature scene with flowers and leaves to color in</h2>

  <div class="toolbar">
    <div id="swatches"></div>
    <button class="btn-reset" onclick="resetAll()">Clear</button>
  </div>

  <div class="canvas-wrap">

      <line x1="130" y1="380" x2="130" y2="240" stroke="#1A2340" stroke-width="2" stroke-linecap="round"/>
      <line x1="270" y1="380" x2="270" y2="250" stroke="#1A2340" stroke-width="2" stroke-linecap="round"/>
      <line x1="80" y1="380" x2="80" y2="280" stroke="#1A2340" stroke-width="2" stroke-linecap="round"/>
      <line x1="320" y1="380" x2="320" y2="290" stroke="#1A2340" stroke-width="2" stroke-linecap="round"/>

      <!-- Curved branch stems -->

      <path d="M200 320 Q240 300 270 275" fill="none" stroke="#1A2340" stroke-width="1.5"/>

      <!-- Large leaves on main stem -->

      <ellipse class="region" id="leaf2" cx="225" cy="310" rx="30" ry="14" transform="rotate(30 225 310)" fill="#f0f0f0" onclick="fillRegion(this)"/>
      <ellipse class="region" id="leaf3" cx="165" cy="340" rx="25" ry="12" transform="rotate(-20 165 340)" fill="#f0f0f0" onclick="fillRegion(this)"/>
      <ellipse class="region" id="leaf4" cx="235" cy="350" rx="25" ry="12" transform="rotate(20 235 350)" fill="#f0f0f0" onclick="fillRegion(this)"/>

      <!-- Small side leaves -->
      <ellipse class="region" id="leaf5" cx="108" cy="272" rx="20" ry="9" transform="rotate(-40 108 272)" fill="#f0f0f0" onclick="fillRegion(this)"/>
      <ellipse class="region" id="leaf6" cx="248" cy="278" rx="20" ry="9" transform="rotate(40 248 278)" fill="#f0f0f0" onclick="fillRegion(this)"/>
      <ellipse class="region" id="leaf7" cx="60" cy="295" rx="18" ry="8" transform="rotate(-35 60 295)" fill="#f0f0f0" onclick="fillRegion(this)"/>
      <ellipse class="region" id="leaf8" cx="298" cy="300" rx="18" ry="8" transform="rotate(35 298 300)" fill="#f0f0f0" onclick="fillRegion(this)"/>

      <ellipse class="region" id="p1"  cx="200" cy="165" rx="16" ry="38" transform="rotate(0 200 200)"   fill="#f0f0f0" onclick="fillRegion(this)"/>
      <ellipse class="region" id="p2"  cx="200" cy="165" rx="16" ry="38" transform="rotate(45 200 200)"  fill="#f0f0f0" onclick="fillRegion(this)"/>
      <ellipse class="region" id="p3"  cx="200" cy="165" rx="16" ry="38" transform="rotate(90 200 200)"  fill="#f0f0f0" onclick="fillRegion(this)"/>
      <ellipse class="region" id="p4"  cx="200" cy="165" rx="16" ry="38" transform="rotate(135 200 200)" fill="#f0f0f0" onclick="fillRegion(this)"/>
      <ellipse class="region" id="p5"  cx="200" cy="165" rx="16" ry="38" transform="rotate(180 200 200)" fill="#f0f0f0" onclick="fillRegion(this)"/>
      <ellipse class="region" id="p6"  cx="200" cy="165" rx="16" ry="38" transform="rotate(225 200 200)" fill="#f0f0f0" onclick="fillRegion(this)"/>
      <ellipse class="region" id="p7"  cx="200" cy="165" rx="16" ry="38" transform="rotate(270 200 200)" fill="#f0f0f0" onclick="fillRegion(this)"/>
      <ellipse class="region" id="p8"  cx="200" cy="165" rx="16" ry="38" transform="rotate(315 200 200)" fill="#f0f0f0" onclick="fillRegion(this)"/>
      <circle class="region" id="center1" cx="200" cy="200" r="22" fill="#f0f0f0" onclick="fillRegion(this)"/>

      <!-- LEFT FLOWER — smaller -->
      <ellipse class="region" id="lp1" cx="130" cy="218" rx="11" ry="25" transform="rotate(0 130 240)"   fill="#f0f0f0" onclick="fillRegion(this)"/>
      <ellipse class="region" id="lp2" cx="130" cy="218" rx="11" ry="25" transform="rotate(60 130 240)"  fill="#f0f0f0" onclick="fillRegion(this)"/>
      <ellipse class="region" id="lp3" cx="130" cy="218" rx="11" ry="25" transform="rotate(120 130 240)" fill="#f0f0f0" onclick="fillRegion(this)"/>
      <ellipse class="region" id="lp4" cx="130" cy="218" rx="11" ry="25" transform="rotate(180 130 240)" fill="#f0f0f0" onclick="fillRegion(this)"/>
      <ellipse class="region" id="lp5" cx="130" cy="218" rx="11" ry="25" transform="rotate(240 130 240)" fill="#f0f0f0" onclick="fillRegion(this)"/>
      <ellipse class="region" id="lp6" cx="130" cy="218" rx="11" ry="25" transform="rotate(300 130 240)" fill="#f0f0f0" onclick="fillRegion(this)"/>
      <circle class="region" id="lcenter" cx="130" cy="240" r="14" fill="#f0f0f0" onclick="fillRegion(this)"/>

      <!-- RIGHT FLOWER — smaller -->
      <ellipse class="region" id="rp1" cx="270" cy="228" rx="11" ry="25" transform="rotate(0 270 250)"   fill="#f0f0f0" onclick="fillRegion(this)"/>
      <ellipse class="region" id="rp2" cx="270" cy="228" rx="11" ry="25" transform="rotate(60 270 250)"  fill="#f0f0f0" onclick="fillRegion(this)"/>
      <ellipse class="region" id="rp3" cx="270" cy="228" rx="11" ry="25" transform="rotate(120 270 250)" fill="#f0f0f0" onclick="fillRegion(this)"/>
      <ellipse class="region" id="rp4" cx="270" cy="228" rx="11" ry="25" transform="rotate(180 270 250)" fill="#f0f0f0" onclick="fillRegion(this)"/>
      <ellipse class="region" id="rp5" cx="270" cy="228" rx="11" ry="25" transform="rotate(240 270 250)" fill="#f0f0f0" onclick="fillRegion(this)"/>
      <ellipse class="region" id="rp6" cx="270" cy="228" rx="11" ry="25" transform="rotate(300 270 250)" fill="#f0f0f0" onclick="fillRegion(this)"/>
      <circle class="region" id="rcenter" cx="270" cy="250" r="14" fill="#f0f0f0" onclick="fillRegion(this)"/>

      <!-- FAR LEFT bud -->
      <ellipse class="region" id="bl1" cx="80" cy="262" rx="9" ry="20" transform="rotate(0 80 280)"   fill="#f0f0f0" onclick="fillRegion(this)"/>
      <ellipse class="region" id="bl2" cx="80" cy="262" rx="9" ry="20" transform="rotate(72 80 280)"  fill="#f0f0f0" onclick="fillRegion(this)"/>

      <ellipse class="region" id="br2" cx="320" cy="272" rx="9" ry="20" transform="rotate(72 320 290)"  fill="#f0f0f0" onclick="fillRegion(this)"/>

      <ellipse class="region" id="br4" cx="320" cy="272" rx="9" ry="20" transform="rotate(216 320 290)" fill="#f0f0f0" onclick="fillRegion(this)"/>
      <ellipse class="region" id="br5" cx="320" cy="272" rx="9" ry="20" transform="rotate(288 320 290)" fill="#f0f0f0" onclick="fillRegion(this)"/>

      <!-- Ground bumps -->
      <ellipse class="region" id="g1" cx="200" cy="385" rx="80" ry="18" fill="#f0f0f0" onclick="fillRegion(this)"/>
      <ellipse class="region" id="g2" cx="80"  cy="392" rx="50" ry="14" fill="#f0f0f0" onclick="fillRegion(this)"/>
      <ellipse class="region" id="g3" cx="320" cy="392" rx="50" ry="14" fill="#f0f0f0" onclick="fillRegion(this)"/>

    </svg>
  </div>

  <div class="stats">
    <div class="stat"><div class="stat-val" id="filled-count">0</div><div class="stat-lbl">regions filled</div></div>
    <div class="stat"><div class="stat-val" id="total-count">0</div><div class="stat-lbl">total regions</div></div>
    <div class="stat"><div class="stat-val" id="pct">0%</div><div class="stat-lbl">complete</div></div>
  </div>
  <div class="complete-msg" id="complete-msg">Garden complete! Beautiful work.</div>
</div>

<script>
const palette = [
  { hex: "#C9A84C", name: "gold" },
  { hex: "#4ABFB4", name: "teal" },
  { hex: "#D4537E", name: "pink" },
  { hex: "#639922", name: "green" },
  { hex: "#378ADD", name: "blue" },
  { hex: "#D85A30", name: "coral" },
  { hex: "#8E44AD", name: "purple" },
  { hex: "#E67E22", name: "amber" },
];

let activeColor = palette[0].hex;
const defaultFill = "#f0f0f0";

const swatchContainer = document.getElementById("swatches");
swatchContainer.style.cssText = "display:flex;gap:6px;flex-wrap:wrap;";

palette.forEach((c, i) => {
  const s = document.createElement("div");
  s.className = "color-swatch" + (i === 0 ? " active" : "");
  s.style.background = c.hex;
  s.title = c.name;
  s.onclick = () => {
    document.querySelectorAll(".color-swatch").forEach(el => el.classList.remove("active"));
    s.classList.add("active");
    activeColor = c.hex;
  };
  swatchContainer.appendChild(s);
});

function fillRegion(el) {
  if (el.getAttribute("fill") === activeColor) {
    el.setAttribute("fill", defaultFill);
  } else {
    el.setAttribute("fill", activeColor);
  }
  updateStats();
}

function updateStats() {
  const regions = document.querySelectorAll(".region");
  const total = regions.length;
  let filled = 0;
  regions.forEach(r => { if (r.getAttribute("fill") !== defaultFill) filled++; });
  document.getElementById("filled-count").textContent = filled;
  document.getElementById("total-count").textContent = total;
  document.getElementById("pct").textContent = Math.round(filled / total * 100) + "%";
  const msg = document.getElementById("complete-msg");
  msg.style.display = filled === total ? "block" : "none";
}

function resetAll() {
  document.querySelectorAll(".region").forEach(r => r.setAttribute("fill", defaultFill));
  updateStats();
}

updateStats();
</script>
